apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: boutique-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/vinaymanjunath2001/clouddeployx-gitops.git
    targetRevision: HEAD
    path: boutique/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: boutique-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true